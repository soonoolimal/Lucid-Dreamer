run:
    sample_every: 0
    n_sample_eps: 0
    debug: false
    resume_timestamp: ''
    wandb_id: ''
    from_checkpoint_regex: '.*'
    save_every: 120

logger:
    outputs: [jsonl, scope, wandb]
    wandb_filter: 'score|length|fps|train/loss/|train/rand/|report/loss/|report/openloop/|report/policy_image|eval/loss/'
    wandb_project: Lucid-Dreamer-v2
    wandb_group: ''

env:
    vizdoom:
        skip: 4
        level: 3
        timeout: 2100
        size: 64
        cheat: false
        switch_every: 1.5e6
        dy_type: 0

kick:
    seq_len: 32
    n_confirm: 5
    gamma: 1.0
    target_rtg: 0.0
    ema_alpha: 0.05
    warmup_steps: 1e4

inception:
    seed: 0
    device: cuda
